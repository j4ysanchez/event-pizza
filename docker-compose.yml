services:
  web:
    build: ./web
    ports:
      - "80:80"

  # api:
  #   build: ./api
  #   environment:
  #     DATABASE_URL: postgresql://pizza:pizza@db:5432/pizza
  #   depends_on:
  #     db:
  #       condition: service_healthy

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: pizza
      POSTGRES_PASSWORD: pizza
      POSTGRES_DB: pizza
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pizza"]
      interval: 5s
      retries: 5

volumes:
  db_data:
